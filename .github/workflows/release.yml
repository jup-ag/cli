name: Release

on:
  push:
    branches: [main]
    paths: [package.json]

permissions:
  contents: write
  id-token: write # required for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check for version bump
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $VERSION"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        if: steps.version.outputs.changed == 'true'
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: lts/* # Node 24 LTS ships npm >=11.5.1, required for OIDC trusted publishing

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Run checks
        if: steps.version.outputs.changed == 'true'
        run: bun run ci

      - name: Build binaries
        if: steps.version.outputs.changed == 'true'
        run: bun run build:binary

      - name: Build npm package
        if: steps.version.outputs.changed == 'true'
        run: bun run build

      - name: Generate checksums
        if: steps.version.outputs.changed == 'true'
        run: cd dist && sha256sum jup-* > checksums.txt

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public --provenance

      - name: Wait for npm package availability
        if: steps.version.outputs.changed == 'true'
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
        run: |
          for attempt in {1..30}; do
            PUBLISHED_VERSION=$(npm view @jup-ag/cli version 2>/dev/null || true)
            if [ "$PUBLISHED_VERSION" = "$EXPECTED_VERSION" ]; then
              echo "npm package version $EXPECTED_VERSION is available"
              exit 0
            fi
            echo "Waiting for npm to serve $EXPECTED_VERSION (got ${PUBLISHED_VERSION:-<none>})"
            sleep 10
          done
          echo "Timed out waiting for npm package version $EXPECTED_VERSION"
          exit 1

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/jup-*
            dist/checksums.txt
            scripts/install.sh
          generate_release_notes: true
